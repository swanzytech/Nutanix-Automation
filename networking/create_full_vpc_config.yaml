# Cluster where VLAN subnets and the local BGP gateway are deployed.
# Must match the name exactly as it appears in Prism Central.
cluster: "ZEN-SV2-NTX01"                         # required

# VLAN Subnets — physical subnets on the cluster
subnets:
  - name: "ZEN-SV2-VPCr"                          # required
    vlan_id: 427                                   # required
    network_ip: "198.18.129.248"                   # required
    prefix: 29                                     # required
    gateway_ip: "198.18.129.249"                   # required
    pool_start: "198.18.129.250"                   # required
    pool_end: "198.18.129.251"                     # required
    is_external: true                              # optional, default: false

  - name: "ZEN-SV2-BGP-RR"
    vlan_id: 426
    network_ip: "198.18.129.240"
    prefix: 29
    gateway_ip: "198.18.129.241"
    pool_start: "198.18.129.242"
    pool_end: "198.18.129.243"

# Transit VPCs — hub VPC that connects to the physical network
transit_vpcs:
  - name: "ZEN-SV2-Transit-VPC"                   # required
    external_subnet: "ZEN-SV2-VPCr"               # required — must match a subnet name above
    routable_cidr: "10.0.10.0/24"                 # optional
    vpc_type: TRANSIT                              # optional, default: REGULAR

# Transit Overlays — overlay subnet inside the Transit VPC, used as the uplink for child VPCs
transit_overlays:
  - name: "ZEN-SV2-Transit-OVERLAY"               # required
    vpc: "ZEN-SV2-Transit-VPC"                    # required — must match a transit_vpc name above
    network_ip: "198.18.207.232"                  # required
    prefix: 29                                    # required
    gateway_ip: "198.18.207.233"                  # required
    pool_start: "198.18.207.234"                  # required
    pool_end: "198.18.207.237"                    # required
    is_external: true                             # optional, default: false

# Child VPCs — tenant VPCs that attach to the Transit VPC
vpcs:
  - name: "ZEN-SV2-ACTIVE"                        # required
    external_subnet: "ZEN-SV2-Transit-OVERLAY"    # required — must match a transit_overlay name above

  - name: "ZEN-SV2-WORKLOADS"
    external_subnet: "ZEN-SV2-Transit-OVERLAY"
    routable_cidr: "10.0.10.0/24"                 # optional

# Overlay Subnets — workload subnets inside child VPCs
overlays:
  - name: "ZEN-AT4-DRaaS"                         # required
    vpc: "ZEN-SV2-WORKLOADS"                      # required — must match a vpc name above
    network_ip: "10.0.10.0"                       # required
    prefix: 24                                    # required
    gateway_ip: "10.0.10.1"                       # required
    pool_start: "10.0.10.2"                       # required
    pool_end: "10.0.10.253"                       # required

  # - name: "ZEN-AT4-Example"
  #   vpc: "ZEN-SV2-WORKLOADS"
  #   network_ip: "10.0.11.0"
  #   prefix: 24
  #   gateway_ip: "10.0.11.1"
  #   pool_start: "10.0.11.2"
  #   pool_end: "10.0.11.253"

# Local BGP Gateway — runs on-cluster, handles north-south routing
local_gateways:
  - name: "ZEN-SV2-BGP-LOCAL"                     # required
    subnet: "ZEN-SV2-BGP-RR"                      # required — must match a subnet name above
    vpc: "ZEN-SV2-Transit-VPC"                    # required — must match a transit_vpc name above
    cluster: "ZEN-SV2-NTX01"                      # required — must match cluster above
    asn: 65299                                    # required
    static_ips:                                   # required — one IP per gateway interface
      - "198.18.129.242"
      - "198.18.129.243"
    gateway_ip: "198.18.129.241"                  # required
    prefix: 29                                    # required

# Remote BGP Gateway — the upstream peer
remote_gateways:
  - name: "ZEN-SV2-BGP-REMOTE"                    # required
    service_ip: "198.18.129.249"                  # required
    asn: 65298                                    # required

# BGP Sessions — one session per local gateway interface IP
bgp_sessions:
  - name: "ZEN-SV2-BGP-1"                         # required
    local_gateway: "ZEN-SV2-BGP-LOCAL"            # required — must match a local_gateway name above
    remote_gateway: "ZEN-SV2-BGP-REMOTE"          # required — must match a remote_gateway name above
    local_interface_ip: "198.18.129.242"          # optional — pins session to a specific interface
    advertise_all_prefixes: true                  # optional, default: false

  - name: "ZEN-SV2-BGP-2"
    local_gateway: "ZEN-SV2-BGP-LOCAL"
    remote_gateway: "ZEN-SV2-BGP-REMOTE"
    local_interface_ip: "198.18.129.243"
    advertise_all_prefixes: true
